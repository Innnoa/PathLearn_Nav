# [DATA_TAG] KEEP | HISTORY | P0阶段配置
# PathLearn App 配置文件
# 说明：
# 1) 语法为 key = value
# 2) 支持注释前缀: # / ; / //
# 3) 优先级：默认值 < 配置文件 < 命令行

# base_dir：路径基准目录（相对路径将基于该目录解析；推荐 . 表示项目根目录）
base_dir = .

# map：地图文件路径
map = data/maps/scene_custom.txt

# no_gui：是否关闭图形界面（true/false）
no_gui = false
# hold：仿真结束后是否保持窗口不自动关闭（true/false）
hold = true
# fps：可视化目标帧率（仅GUI模式生效，0表示尽快渲染）
fps = 30

# speed：机器人最大速度（单位：m/s）
speed = 1.0
# time_step：仿真时间步长（单位：s）
time_step = 1.0
# detour：仿真时域绕行系数（>=1，越大给规划更长时间窗）
detour = 4.0
# max_steps：仿真最大步数（0表示自动估算）
max_steps = 0

# exploration：探索权重（建议范围 [1,8]，越大越偏探索）
exploration = 8.0
# show_tree：是否显示RRT搜索树（true/false）
show_tree = true
# tree_limit：可视化时最多绘制的树边数量
tree_limit = 55000
# trace：规划日志输出模式（off/console）
trace = off
# trace_every：规划日志输出间隔（每N次迭代输出一次）
trace_every = 20000
# rrt_max_iters：RRT最大迭代预算（0表示使用内部默认）
rrt_max_iters = 500000

# nn_guide：是否启用神经网络引导采样（true/false）
nn_guide = false
# nn_model：神经网络模型文件路径
nn_model = data/models/nn_sampler_default.txt
# nn_prob：神经网络引导采样概率（范围 [0,1]）
nn_prob = 0.35
# nn_distance：神经网络建议采样距离（0表示自动估算）
nn_distance = 0.0

# learning：是否启用学习模块（true/false）
learning = true
# learn_rounds：单次运行的学习轮次（>=1）
learn_rounds = 1

# seed：随机种子（用于复现）
seed = 42
