# PathLearn Eval P1 challenge 调优配置文件（P1-1）
# 说明：
# 1) 用于在 challenge 档恢复“baseline vs learning”可分辨信号
# 2) 保持 rrt_max_iters=300000 不变，先调学习相关参数

# base_dir：路径基准目录
base_dir = .

# map：单地图评测路径
map = data/maps/scene_custom.txt
# maps_limit：内置地图数量上限（0表示不限制）
maps_limit = 0
# profiles：评测规则
profiles = static
# mode：评测模式（baseline/learning/both）
mode = both
# out_prefix：输出CSV前缀
out_prefix = data/BenchmarK/p1/tune/p1_challenge_tune_{timestamp}

# seeds：调优阶段先用10，观察趋势
seeds = 10
# seed_start：起始种子
seed_start = 1
# learn_epochs：提高学习轮次，增强权重调整作用
learn_epochs = 8
# log_every：进度日志间隔
log_every = 1

# 起终点
start_x = -33
start_y = -33
start_theta = 0
goal_x = 33
goal_y = 33
goal_theta = 0

# 仿真参数
speed = 1.0
time_step = 1.0
detour = 4.0
max_steps = 0
# 减少无效重试次数，平衡速度与再尝试
max_wait_steps = 1
# 将初始探索权重降到中位，给学习留上调空间
exploration = 4.0

# 预算保持 challenge 档
rrt_max_iters = 300000

# 关闭树绘制与控制台trace，提升批量评测速度
show_tree = false
tree_limit = 20000
trace = off
trace_every = 20000

# 开启 NN 引导并适度提高采样概率
nn_guide = true
nn_model = data/models/nn_sampler_default.txt
nn_prob = 0.60
nn_distance = 0.0

# 批量评测关闭GUI
gui = false
gui_step = true
gui_width = 900
gui_height = 700
fps = 30
