# PathLearn Eval P2 A* 学习配置
# 日期：2026-03-01
# 执行者：Codex
#
# 说明：
# 1) 本配置用于 A* + NN 启发 + 学习轮次（learning）。
# 2) 主要与 heuristic 差异：mode=learning、learn_epochs=5。

base_dir = .

map = data/maps/scene_custom.txt
maps_limit = 0
profiles = static
mode = learning
out_prefix = data/BenchmarK/p2_astar/learning/astar_learn_scene_custom_s30_e5_{timestamp}

seeds = 30
seed_start = 1
learn_epochs = 5
log_every = 1

start_x = -33
start_y = -33
start_theta = 0
goal_x = 33
goal_y = 33
goal_theta = 0

planner = astar
speed = 1.0
time_step = 1.0
detour = 4.0
max_steps = 0
max_wait_steps = 4
exploration = 8.0
rrt_max_iters = 500000
astar_resolution = 0.3
astar_diagonal = true
astar_heuristic_weight = 1.2
show_tree = false
tree_limit = 55000
trace = off
trace_every = 20000

# A* 学习组：开启学习启发，并执行学习轮
nn_guide = true
nn_model = data/models/nn_sampler_default.txt
nn_prob = 0.35
nn_distance = 0.0

gui = false
gui_step = false
gui_width = 900
gui_height = 700
fps = 30
