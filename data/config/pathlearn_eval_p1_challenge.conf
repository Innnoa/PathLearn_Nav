# PathLearn Eval P1 challenge 配置文件
# 说明：
# 1) 语法为 key = value
# 2) 优先级：默认值 < 配置文件 < 命令行
# 3) P1-0 协议：固定输入，比较 baseline 与 learning（mode=both）

# base_dir：路径基准目录（相对路径将基于该目录解析；推荐 . 表示项目根目录）
base_dir = .

# map：单地图评测路径（留空则使用内置地图列表）
map = data/maps/scene_custom.txt
# maps_limit：内置地图数量上限（0表示不限制）
maps_limit = 0
# profiles：评测规则集合（static/line/bounce/all，可逗号分隔）
profiles = static
# mode：评测模式（baseline/learning/both）
mode = both
# out_prefix：输出CSV文件前缀（支持 {timestamp} 占位符）
out_prefix = data/BenchmarK/p1/challenge/p1_challenge_{timestamp}

# seeds：每个场景/规则的种子数量
seeds = 30
# seed_start：起始种子值
seed_start = 1
# learn_epochs：学习模式下每个种子的学习轮次
learn_epochs = 5
# log_every：进度日志输出间隔（每N轮输出一次）
log_every = 1

# start_x：起点x坐标
start_x = -33
# start_y：起点y坐标
start_y = -33
# start_theta：起点朝向角（弧度）
start_theta = 0
# goal_x：终点x坐标
goal_x = 33
# goal_y：终点y坐标
goal_y = 33
# goal_theta：终点朝向角（弧度）
goal_theta = 0

# speed：机器人最大速度（单位：m/s）
speed = 1.0
# time_step：仿真时间步长（单位：s）
time_step = 1.0
# detour：仿真时域绕行系数（>=1）
detour = 4.0
# max_steps：仿真最大步数（0表示自动估算）
max_steps = 0
# max_wait_steps：单次run在无路径时允许等待重规划的最大次数（>=0）
max_wait_steps = 0
# exploration：探索权重（建议范围 [1,8]）
exploration = 8.0
# rrt_max_iters：RRT最大迭代预算（0表示使用内部默认）
rrt_max_iters = 300000
# show_tree：是否显示RRT搜索树（true/false）
show_tree = false
# tree_limit：可视化时最多绘制的树边数量
tree_limit = 55000
# trace：规划日志输出模式（off/console）
trace = console
# trace_every：规划日志输出间隔（每N次迭代输出一次）
trace_every = 20000

# nn_guide：是否启用神经网络引导采样（true/false）
nn_guide = true
# nn_model：神经网络模型文件路径
nn_model = data/models/nn_sampler_default.txt
# nn_prob：神经网络引导采样概率（范围 [0,1]）
nn_prob = 0.35
# nn_distance：神经网络建议采样距离（0表示自动估算）
nn_distance = 0.0

# gui：是否启用GUI显示（true/false）
gui = false
# gui_step：是否逐轮手动继续（true/false）
gui_step = true
# gui_width：GUI窗口宽度（像素）
gui_width = 900
# gui_height：GUI窗口高度（像素）
gui_height = 700
# fps：GUI目标帧率（0表示尽快渲染）
fps = 30
